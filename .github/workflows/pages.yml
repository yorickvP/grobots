name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
        continue-on-error: true

      - name: Build wasm
        run: nix build .#emcc

      - name: Prepare pages
        run: |
          mkdir -p _site
          cp result/bin/grobots_wasm.html _site/index.html
          cp result/bin/grobots_wasm.js _site/grobots_wasm.js
          cp result/bin/grobots_wasm.wasm _site/grobots_wasm.wasm

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
